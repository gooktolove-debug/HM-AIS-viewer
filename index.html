
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auckland Harbour AIS Viewer</title>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ===== Leaflet critical CSS (기존 유지) ===== -->
  <style>
    .leaflet-container{width:100%!important;height:100%!important}
  </style>

  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --card:#1f2937;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:rgba(255,255,255,.12);
      --cyan:#0ea5e9;
      --input:#0b1222;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    *{box-sizing:border-box}

    /* ===== DESKTOP LAYOUT (기존 유지) ===== */
    .app{
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      width:100vw;
      height:100vh;
    }

    .sidebar{
      width:360px;
      height:100vh;
      overflow-y:auto;
      background:linear-gradient(180deg,var(--panel),#0b1020);
      border-right:1px solid var(--border);
      padding:18px;
      z-index:1000;
    }

    .map-shell{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#08111f;
    }

    #map{
      position:absolute;
      inset:0;
    }

    /* ===== UI ===== */
    h1{font-size:18px;margin:0}
    .subtitle{font-size:12px;color:var(--muted)}
    .card{
      border:1px solid var(--border);
      background:rgba(31,41,55,.75);
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
    }

    input,select,button{
      width:100%;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      border-radius:10px;
      padding:10px;
    }

    button{
      cursor:pointer;
      background:var(--cyan);
      border:none;
      font-weight:700;
    }

    button.secondary{
      background:#334155;
    }

    .row{display:flex;gap:8px}
    .status{font-size:11px;color:var(--muted)}

    /* ===== MOBILE BOTTOM SHEET ===== */
    @media(max-width:900px){

      .app{
        display:block;
      }

      .map-shell{
        position:fixed;
        inset:0;
        height:100vh;
        width:100vw;
        z-index:0;
      }

      .sidebar{
        position:fixed;
        left:0;
        bottom:0;
        width:100%;
        height:80vh;

        border-radius:18px 18px 0 0;
        border-right:none;
        border-top:1px solid var(--border);

        transform:translateY(70%);
        transition:transform 0.3s ease;

        z-index:1001;
        padding-top:8px;
      }

      .sidebar.open{
        transform:translateY(0%);
      }

      .sidebar.mid{
        transform:translateY(40%);
      }

      .drag-handle{
        width:50px;
        height:5px;
        background:#6b7280;
        border-radius:3px;
        margin:6px auto 12px auto;
      }
    }
  </style>
</head>

<body>
<div class="app">

  <!-- ===== SIDEBAR / BOTTOM SHEET ===== -->
  <aside class="sidebar mid">

    <!-- drag handle (mobile only) -->
    <div class="drag-handle" id="dragHandle"></div>

    <h1>Auckland Harbour AIS Viewer</h1>
    <p class="subtitle">Real AIS / Supabase Edge Function</p>

    <div class="card">
      <strong>Real AIS Connection</strong>
      <label>Endpoint URL</label>
      <input id="endpointUrl" />
      <div class="row">
        <button id="loadRealBtn">Load real AIS</button>
        <button id="saveEndpointBtn" class="secondary">Save URL</button>
      </div>
      <div id="sourceStatus" class="status"></div>
    </div>

    <div class="card">
      <label>Vessel Search</label>
      <input id="searchBox" placeholder="Name / MMSI" />
      <div class="row">
        <button id="refreshBtn">Refresh</button>
        <button id="clearTrackBtn" class="secondary">Clear track</button>
      </div>
    </div>

    <div class="card">
      <strong>Selected Vessel</strong>
      <div id="selectedDetails" class="status">Select a vessel.</div>
    </div>

    <div class="card">
      <strong>Vessel List</strong>
      <div id="vesselList"></div>
    </div>

  </aside>

  <!-- ===== MAP ===== -->
  <main class="map-shell">
    <div id="map"></div>
  </main>

</div>

<script>
/* ===== MAP INIT ===== */
const map = L.map('map').setView([-36.84,174.79],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18,
  attribution:'© OpenStreetMap'
}).addTo(map);

/* ===== BOTTOM SHEET DRAG ===== */
const sheet = document.querySelector('.sidebar');
const handle = document.getElementById('dragHandle');

let startY=0,currentY=0,isDragging=false;

handle.addEventListener('touchstart',e=>{
  isDragging=true;
  startY=e.touches[0].clientY;
});

handle.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  currentY=e.touches[0].clientY;
  const diff=currentY-startY;
  sheet.style.transition='none';
  sheet.style.transform=`translateY(${Math.min(70,Math.max(0,40+diff/5))}%)`;
});

handle.addEventListener('touchend',()=>{
  isDragging=false;
  sheet.style.transition='transform .3s ease';
  const diff=currentY-startY;
  if(diff<-50){
    sheet.classList.add('open');
    sheet.classList.remove('mid');
  }else{
    sheet.classList.remove('open');
    sheet.classList.add('mid');
  }
});
</script>
</body>
</html>
