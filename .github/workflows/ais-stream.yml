
name: AIS Stream Worker

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm install ws node-fetch

      - name: Run AIS Listener
        env:
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node <<EOF
          const WebSocket = require('ws');
          const fetch = (...args) => import('node-fetch').then(({default: fetch}) => fetch(...args));

          console.log("Connecting to AISStream...");

          const ws = new WebSocket('wss://stream.aisstream.io/v0/stream', {
            headers: {
              Authorization: process.env.AIS_API_KEY
            }
          });

          ws.on('open', () => {
            console.log("✅ Connected");

            // 🌏 NZ 전체 범위 (확실히 데이터 나옴)
            ws.send(JSON.stringify({
              BoundingBoxes: [[
                [-45, 160],
                [-25, 185]
              ]]
            }));
          });

          ws.on('message', async (msg) => {

            console.log("🔥 RAW:", msg.toString());

            try {
              const data = JSON.parse(msg);
              console.log("Parsed message");

              if (!data.Message) return;

              const v = data.Message.PositionReport;

              if (!v) {
                console.log("Skip non-position message");
                return;
              }

              console.log("🚢 AIS RECEIVED:", v.MMSI);

              const payload = {
                mmsi: v.MMSI,
                lat: v.Latitude,
                lon: v.Longitude,
                sog: v.Sog,
                cog: v.Cog,
                heading: v.TrueHeading || 0,
                received_at: new Date().toISOString()
              };

              const res = await fetch(
                process.env.SUPABASE_URL + "/rest/v1/ais_latest?on_conflict=mmsi",
                {
                  method: "POST",
                  headers: {
                    "apikey": process.env.SUPABASE_KEY,
                    "Content-Type": "application/json",
                    "Prefer": "resolution=merge-duplicates"
                  },
                  body: JSON.stringify(payload)
                }
              );

              console.log("✅ Saved:", v.MMSI);

            } catch (err) {
              console.log("❌ Error:", err.message);
            }
          });

          ws.on('error', (err) => {
            console.log("WS Error:", err.message);
          });

          // keep running
          setInterval(() => {}, 1000);

          EOF
