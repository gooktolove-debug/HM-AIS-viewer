
name: AIS Stream Worker

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm install ws node-fetch

      - name: Run AIS Listener
        env:
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node <<EOF
          const WebSocket = require('ws');
          const fetch = (...args) => import('node-fetch').then(({ default: fetch }) => fetch(...args));

          console.log("Connecting to AISStream...");

          const ws = new WebSocket('wss://stream.aisstream.io/v0/stream');

          ws.on('open', () => {
            console.log("✅ Connected");

            ws.send(JSON.stringify({
              APIKey: process.env.AIS_API_KEY,
              BoundingBoxes: [[
                [-45, 160],
                [-25, 180]
              ]]
            }));
          });

          ws.on('message', async (msg) => {
            try {
              const raw = msg.toString();
              console.log("🔥 RAW:", raw);

              const data = JSON.parse(raw);

              if (!data.Message) {
                console.log("Skip: no Message");
                return;
              }

              const v = data.Message.PositionReport;

              if (!v) {
                console.log("Skip non-position message");
                return;
              }

              // AISStream PositionReport uses UserID as MMSI.
              const mmsi = v.UserID || data.MetaData?.MMSI;

              if (!mmsi) {
                console.log("Skip: MMSI/UserID missing");
                return;
              }

              if (v.Latitude === undefined || v.Longitude === undefined) {
                console.log("Skip: lat/lon missing for", mmsi);
                return;
              }

              const payload = {
                mmsi: Number(mmsi),
                lat: Number(v.Latitude),
                lon: Number(v.Longitude),
                sog: v.Sog !== undefined ? Number(v.Sog) : null,
                cog: v.Cog !== undefined ? Number(v.Cog) : null,
                heading: v.TrueHeading !== undefined ? Number(v.TrueHeading) : null,
                received_at: new Date().toISOString()
              };

              console.log("🚢 AIS RECEIVED:", payload);

              const res = await fetch(
                process.env.SUPABASE_URL + "/rest/v1/ais_latest?on_conflict=mmsi",
                {
                  method: "POST",
                  headers: {
                    "apikey": process.env.SUPABASE_KEY,
                    "Authorization": "Bearer " + process.env.SUPABASE_KEY,
                    "Content-Type": "application/json",
                    "Prefer": "resolution=merge-duplicates,return=minimal"
                  },
                  body: JSON.stringify(payload)
                }
              );

              if (!res.ok) {
                const errorText = await res.text();
                console.log("❌ Supabase insert failed:", res.status, errorText);
                return;
              }

              console.log("✅ Saved:", payload.mmsi);

            } catch (err) {
              console.log("❌ Error:", err.message);
            }
          });

          ws.on('error', (err) => {
            console.log("WS Error:", err.message);
          });

          ws.on('close', (code, reason) => {
            console.log("WS Closed:", code, reason.toString());
          });

          // keep running
          setInterval(() => {}, 1000);
          EOF
