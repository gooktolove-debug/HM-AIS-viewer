
name: AIS Stream Worker

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm install ws node-fetch

      - name: Run AIS Listener
        env:
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node <<'EOF'
          const WebSocket = require('ws');
          const fetch = (...args) => import('node-fetch').then(({ default: fetch }) => fetch(...args));

          const SUPABASE_URL = String(process.env.SUPABASE_URL || '').replace(/\/+$/, '');
          const SUPABASE_KEY = process.env.SUPABASE_KEY;
          const AIS_API_KEY = process.env.AIS_API_KEY;

          const AIS_LATEST_ENDPOINT = SUPABASE_URL + "/rest/v1/ais_latest?on_conflict=mmsi";
          const AIS_POSITIONS_ENDPOINT = SUPABASE_URL + "/rest/v1/ais_positions";

          const HISTORY_INTERVAL_MS = 60 * 1000;
          const RETENTION_HOURS = 6;
          const CLEANUP_INTERVAL_MS = 10 * 60 * 1000;

          const lastHistorySave = new Map();

          const baseHeaders = {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
          };

          function numOrNull(value) {
            const n = Number(value);
            return Number.isFinite(n) && n > 0 ? n : null;
          }

          function normaliseDraft(raw) {
            const n = Number(raw);
            if (!Number.isFinite(n) || n <= 0) return null;

            // Some feeds provide draught in decimetres.
            // If the value is unusually high for metres, convert to metres.
            return n > 25 ? n / 10 : n;
          }

          function extractDimension(staticData) {
            const d = staticData.Dimension || staticData.Dimensions || {};

            const toBow = numOrNull(
              d.A ??
              d.ToBow ??
              d.to_bow ??
              staticData.DimensionToBow ??
              staticData.ToBow
            );

            const toStern = numOrNull(
              d.B ??
              d.ToStern ??
              d.to_stern ??
              staticData.DimensionToStern ??
              staticData.ToStern
            );

            const toPort = numOrNull(
              d.C ??
              d.ToPort ??
              d.to_port ??
              staticData.DimensionToPort ??
              staticData.ToPort
            );

            const toStarboard = numOrNull(
              d.D ??
              d.ToStarboard ??
              d.to_starboard ??
              staticData.DimensionToStarboard ??
              staticData.ToStarboard
            );

            const loa =
              toBow && toStern
                ? toBow + toStern
                : numOrNull(staticData.LOA ?? staticData.Length ?? staticData.length);

            const breadth =
              toPort && toStarboard
                ? toPort + toStarboard
                : numOrNull(staticData.Breadth ?? staticData.Beam ?? staticData.Width ?? staticData.beam);

            const draft = normaliseDraft(
              staticData.MaximumStaticDraught ??
              staticData.MaximumPresentStaticDraught ??
              staticData.Draught ??
              staticData.Draft ??
              staticData.draft
            );

            return { loa, breadth, draft };
          }

          async function postJson(endpoint, payload, prefer) {
            const res = await fetch(endpoint, {
              method: "POST",
              headers: {
                ...baseHeaders,
                "Prefer": prefer
              },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              console.log("Supabase write failed:", res.status, await res.text(), payload);
              return false;
            }

            return true;
          }

          async function cleanupOldAis() {
            const cutoff = new Date(Date.now() - RETENTION_HOURS * 60 * 60 * 1000).toISOString();
            const tables = ["ais_positions", "ais_latest"];

            for (const table of tables) {
              const endpoint =
                SUPABASE_URL +
                "/rest/v1/" +
                table +
                "?received_at=lt." +
                encodeURIComponent(cutoff);

              const res = await fetch(endpoint, {
                method: "DELETE",
                headers: {
                  ...baseHeaders,
                  "Prefer": "return=minimal"
                }
              });

              if (!res.ok) {
                console.log("Cleanup failed:", table, res.status, await res.text());
              }
            }

            console.log("Cleanup completed. Retention:", RETENTION_HOURS, "hours");
          }

          console.log("SUPABASE_URL:", SUPABASE_URL);
          console.log("Connecting to AISStream...");

          const ws = new WebSocket("wss://stream.aisstream.io/v0/stream");

          ws.on("open", () => {
            console.log("Connected to AISStream");

            ws.send(JSON.stringify({
              APIKey: AIS_API_KEY,
              BoundingBoxes: [[
                [-48, 165],
                [-33, 180]
              ]]
            }));

            cleanupOldAis();
            setInterval(cleanupOldAis, CLEANUP_INTERVAL_MS);
          });

          ws.on("message", async (msg) => {
            try {
              const data = JSON.parse(msg.toString());
              const metaMmsi = data.MetaData && data.MetaData.MMSI
                ? Number(data.MetaData.MMSI)
                : null;

              const position = data.Message && data.Message.PositionReport;

              if (position) {
                const mmsi = Number(position.UserID || metaMmsi);

                if (!mmsi || position.Latitude === undefined || position.Longitude === undefined) {
                  return;
                }

                const nowIso = new Date().toISOString();

                const latestPayload = {
                  mmsi,
                  lat: Number(position.Latitude),
                  lon: Number(position.Longitude),
                  sog: position.Sog !== undefined ? Number(position.Sog) : null,
                  cog: position.Cog !== undefined ? Number(position.Cog) : null,
                  heading: position.TrueHeading !== undefined ? Number(position.TrueHeading) : null,
                  received_at: nowIso,
                  updated_at: nowIso
                };

                const latestSaved = await postJson(
                  AIS_LATEST_ENDPOINT,
                  latestPayload,
                  "resolution=merge-duplicates,return=minimal"
                );

                if (latestSaved) {
                  console.log("Latest saved:", mmsi);
                }

                const nowMs = Date.now();
                const lastSavedMs = lastHistorySave.get(mmsi) || 0;

                if (nowMs - lastSavedMs >= HISTORY_INTERVAL_MS) {
                  const historyPayload = {
                    mmsi,
                    lat: latestPayload.lat,
                    lon: latestPayload.lon,
                    sog: latestPayload.sog,
                    cog: latestPayload.cog,
                    heading: latestPayload.heading,
                    received_at: nowIso
                  };

                  const historySaved = await postJson(
                    AIS_POSITIONS_ENDPOINT,
                    historyPayload,
                    "return=minimal"
                  );

                  if (historySaved) {
                    lastHistorySave.set(mmsi, nowMs);
                    console.log("History saved:", mmsi);
                  }
                }

                return;
              }

              const staticData = data.Message && data.Message.ShipStaticData;

              if (staticData) {
                const mmsi = Number(staticData.UserID || metaMmsi);

                if (!mmsi) return;

                const dimensions = extractDimension(staticData);

                const staticPayload = {
                  mmsi,
                  name: String(staticData.Name || "").trim() || null,
                  callsign: String(staticData.CallSign || "").trim() || null,
                  ship_type: staticData.Type !== undefined ? Number(staticData.Type) : null,
                  loa: dimensions.loa,
                  breadth: dimensions.breadth,
                  draft: dimensions.draft,
                  updated_at: new Date().toISOString()
                };

                const staticSaved = await postJson(
                  AIS_LATEST_ENDPOINT,
                  staticPayload,
                  "resolution=merge-duplicates,return=minimal"
                );

                if (staticSaved) {
                  console.log(
                    "Static saved:",
                    mmsi,
                    staticPayload.name || "(no name)",
                    "LOA",
                    staticPayload.loa,
                    "Breadth",
                    staticPayload.breadth,
                    "Draft",
                    staticPayload.draft
                  );
                }

                return;
              }
            } catch (err) {
              console.log("Message error:", err.message);
            }
          });

          ws.on("error", (err) => {
            console.log("WS Error:", err.message);
          });

          ws.on("close", (code, reason) => {
            console.log("WS Closed:", code, reason.toString());
          });

          setInterval(() => {}, 1000);
          EOF
