name: AIS Stream Worker

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm install ws node-fetch

      - name: Run AIS Listener
        env:
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node <<EOF
          const WebSocket = require('ws');
          const fetch = (...args) => import('node-fetch').then(({ default: fetch }) => fetch(...args));

          const SUPABASE_ENDPOINT = process.env.SUPABASE_URL + "/rest/v1/ais_latest?on_conflict=mmsi";

          async function upsertAis(payload) {
            const res = await fetch(SUPABASE_ENDPOINT, {
              method: "POST",
              headers: {
                "apikey": process.env.SUPABASE_KEY,
                "Authorization": "Bearer " + process.env.SUPABASE_KEY,
                "Content-Type": "application/json",
                "Prefer": "resolution=merge-duplicates,return=minimal"
              },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              const errorText = await res.text();
              console.log("❌ Supabase upsert failed:", res.status, errorText, payload);
              return false;
            }
            return true;
          }

          console.log("Connecting to AISStream...");

          const ws = new WebSocket('wss://stream.aisstream.io/v0/stream');

          ws.on('open', () => {
            console.log("✅ Connected");

            ws.send(JSON.stringify({
              APIKey: process.env.AIS_API_KEY,
              BoundingBoxes: [[
                [-45, 160],
                [-25, 180]
              ]]
            }));
          });

          ws.on('message', async (msg) => {
            try {
              const data = JSON.parse(msg.toString());
              const metaMmsi = data.MetaData?.MMSI ? Number(data.MetaData.MMSI) : null;

              // 1) Position reports: latest map position
              const p = data.Message?.PositionReport;
              if (p) {
                const mmsi = Number(p.UserID || metaMmsi);
                if (!mmsi || p.Latitude === undefined || p.Longitude === undefined) return;

                const payload = {
                  mmsi,
                  lat: Number(p.Latitude),
                  lon: Number(p.Longitude),
                  sog: p.Sog !== undefined ? Number(p.Sog) : null,
                  cog: p.Cog !== undefined ? Number(p.Cog) : null,
                  heading: p.TrueHeading !== undefined ? Number(p.TrueHeading) : null,
                  received_at: new Date().toISOString(),
                  updated_at: new Date().toISOString()
                };

                const ok = await upsertAis(payload);
                if (ok) console.log("✅ Position saved:", mmsi, payload.lat, payload.lon);
                return;
              }

              // 2) Ship static data: vessel name / callsign / type
              const s = data.Message?.ShipStaticData;
              if (s) {
                const mmsi = Number(s.UserID || metaMmsi);
                if (!mmsi) return;

                const name = String(s.Name || '').trim();
                const callsign = String(s.CallSign || '').trim();

                const payload = {
                  mmsi,
                  name: name || null,
                  callsign: callsign || null,
                  ship_type: s.Type !== undefined ? Number(s.Type) : null,
                  updated_at: new Date().toISOString()
                };

                const ok = await upsertAis(payload);
                if (ok) console.log("✅ Static saved:", mmsi, name || '(no name)');
                return;
              }

              // Other AIS message types are ignored for now.
            } catch (err) {
              console.log("❌ Error:", err.message);
            }
          });

          ws.on('error', (err) => {
            console.log("WS Error:", err.message);
          });

          ws.on('close', (code, reason) => {
            console.log("WS Closed:", code, reason.toString());
          });

          setInterval(() => {}, 1000);
          EOF
